# configs/exp_transformer_semantic.yaml
# ============================================================
# Experimento: SemanticByteTokenizer + Transformer
# Representación: secuencial con agrupación semántica de bytes
# Modelo: GPT-style decoder-only Transformer
# ============================================================

experiment_name: transformer_semantic_v1

representation:
  representation_type: semantic_byte
  name: semantic_byte_v1
  max_length: 512
  normalization: null

model:
  model_type: transformer
  name: transformer_semantic_v1

  vocab_size: 8192 # vocabulario semántico más compacto
  pad_token_id: 0
  num_classes: 2
  cond_dim: 32

  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  max_seq_len: 512
  dropout: 0.1

  temperature: 1.0
  top_k: 50
  top_p: 0.95

training:
  epochs: 100
  batch_size: 32
  lr: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  seed: 42
  num_workers: 0
  amp: false

  lr_scheduler: cosine
  warmup_epochs: 5
  lr_min: 1.0e-6

  checkpoint_dir: checkpoints/transformer_semantic_v1
  checkpoint_metric: val_loss
  checkpoint_mode: min
  save_last: true
  save_top_k: 2

  early_stopping: true
  early_stopping_patience: 20
  early_stopping_delta: 1.0e-4

  log_every: 50
  val_every: 1
  use_tensorboard: false
  use_wandb: false
  use_ema: false

  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15

data:
  data_dir: data/pcap/
  max_packets: null
  protocols: null
  max_payload_bytes: 20
